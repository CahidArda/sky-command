<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkySim.rs v0.1.0</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading SkySim.rs...</p>
    </div>
    <canvas id="skysim-canvas"></canvas>
    <script type="module">
        import init from './pkg/skysim_rs.js';

        async function run() {
            try {
                await init();
            } catch (error) {
                // winit on WASM uses a thrown exception for control flow
                // ("Using exceptions for control flow, don't mind me")
                // — this is normal and means the app is running.
                if (error && error.message && error.message.includes("don't mind me")) {
                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                const loading = document.getElementById('loading');
                loading.innerHTML = '<p class="error">Failed to load SkySim.rs: ' + error.message + '</p>';
                console.error('Failed to initialize WASM:', error);
            }
        }

        run();

        // Chrome autoplay policy: resume all AudioContexts after first user gesture.
        // Bevy/rodio's internal AudioContext gets suspended at creation.
        // We intercept and resume it on the first click/keydown.
        const origResume = AudioContext.prototype.resume;
        const pendingContexts = [];
        AudioContext.prototype.resume = function() {
            if (!pendingContexts.includes(this)) pendingContexts.push(this);
            return origResume.call(this);
        };
        function resumeAll() {
            pendingContexts.forEach(ctx => {
                if (ctx.state === 'suspended') ctx.resume();
            });
            document.removeEventListener('click', resumeAll);
            document.removeEventListener('keydown', resumeAll);
        }
        document.addEventListener('click', resumeAll);
        document.addEventListener('keydown', resumeAll);
    </script>
</body>
</html>
