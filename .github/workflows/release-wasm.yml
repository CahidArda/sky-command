name: Release WASM

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(./scripts/bump-version.sh wasm ${{ inputs.bump }})
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        working-directory: packages/wasm
        run: cargo update --workspace

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/wasm/Cargo.toml packages/wasm/Cargo.lock
          git commit -m "chore(wasm): release v${{ steps.bump.outputs.version }}"

      - name: Create tag
        run: git tag "wasm-v${{ steps.bump.outputs.version }}"

      - name: Push
        run: git push && git push --tags

      - name: Build release
        working-directory: packages/wasm
        run: wasm-pack build --release --target web

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "wasm-v${{ steps.bump.outputs.version }}"
          name: "@skycommand/wasm v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
          files: |
            packages/wasm/pkg/*.wasm
            packages/wasm/pkg/*.js
